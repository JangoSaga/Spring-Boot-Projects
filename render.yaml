services:
  - type: web
    name: medicare-hms
    env: docker
    plan: free
    rootDir: MediCare HMS
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: SECURITY_USER_NAME
        value: admin
      - key: SECURITY_USER_PASSWORD
        generateValue: true
      - key: DDL_AUTO
        value: "update"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:5173,http://localhost:3000"

  - type: web
    name: medicare-hms-frontend
    runtime: static
    rootDir: Medicare HMS Frontend
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://medicare-hms-jcb0.onrender.com

