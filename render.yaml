services:
  - type: web
    name: medicare-hms
    env: docker
    plan: free
    rootDir: MediCare HMS
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medicare-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: medicare-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: medicare-db
          property: password
      - key: SECURITY_USER_NAME
        value: admin
      - key: SECURITY_USER_PASSWORD
        generateValue: true
      - key: DDL_AUTO
        value: "update"

databases:
  - name: medicare-db
    databaseName: medicare_hms
    plan: free
    postgresMajorVersion: 15
    region: ohio
